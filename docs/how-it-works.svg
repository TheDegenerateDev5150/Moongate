<svg viewBox="0 0 1120 620" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>Moongate connection modes diagram</title>
  <desc>Two routes from the phone to the Raspberry Pi. Route 1, Moongate cloud: the access broker signs a short-lived token and the app reaches the Pi over the LAN at home or through Cloudflare's tunnel away; the Pi's auth proxy admits only broker-signed requests, so a leaked tunnel URL returns only 401s. Route 2, Direct: the app talks straight to the Pi over home WiFi or the user's own WireGuard or Tailscale VPN, with no cloud involved at all. Modes switch per printer without re-pairing.</desc>
  <defs>
    <mask id="b3"><rect width="100" height="100" fill="#000"/><circle cx="50" cy="50" r="15" fill="#fff"/><circle cx="56.5" cy="47" r="12.6" fill="#000"/></mask>
    <g id="m3"><circle cx="50" cy="50" r="32" fill="none" stroke="#FF3B30" stroke-width="6.5"/><circle cx="50" cy="50" r="15" fill="#FF3B30" mask="url(#b3)"/></g>
    <marker id="g3" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto-start-reverse"><path d="M0,0 L6,3 L0,6 Z" fill="#34C759"/></marker>
    <marker id="o3" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto-start-reverse"><path d="M0,0 L6,3 L0,6 Z" fill="#FF9F0A"/></marker>
  </defs>
  <rect width="1120" height="620" rx="26" fill="#F5F5F7"/>
  <use href="#m3" transform="translate(20,20) scale(0.55)"/>
  <text x="85" y="49" font-size="28" font-weight="700" fill="#1d1d1f">Moongate</text>
  <text x="85" y="69" font-size="14" fill="#6e6e73">Two ways to your printer - pick per printer, switch anytime</text>

  <rect x="70" y="240" width="140" height="270" rx="26" fill="#0E0E10"/>
  <rect x="81" y="256" width="118" height="238" rx="15" fill="#16161b"/>
  <use href="#m3" transform="translate(123,320) scale(0.32)"/>
  <text x="140" y="376" font-size="11.5" font-weight="600" fill="#f2f2f2" text-anchor="middle">Moongate</text>
  <circle cx="125" cy="398" r="4.5" fill="#34C759"/><circle cx="155" cy="398" r="4.5" fill="#FF9F0A"/>
  <text x="140" y="419" font-size="9.5" fill="#cfcfd6" text-anchor="middle">2 printers · online</text>
  <text x="140" y="530" font-size="13.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">Your phone</text>

  <rect x="830" y="230" width="260" height="290" rx="20" fill="#ffffff" stroke="#e6e6ec" stroke-width="1.2"/>
  <g transform="translate(848,250)"><rect x="0" y="0" width="56" height="38" rx="4" fill="#1f7a4d"/><rect x="6" y="6" width="15" height="15" rx="2" fill="#0e0e10"/><rect x="27" y="8" width="11" height="11" rx="1.5" fill="#0e0e10"/><rect x="2" y="-3" width="38" height="3" rx="1" fill="#e7b94e"/><rect x="42" y="22" width="11" height="9" rx="1.5" fill="#3a3a3a"/></g>
  <text x="918" y="264" font-size="16" font-weight="700" fill="#1d1d1f">Raspberry Pi</text>
  <text x="918" y="282" font-size="11" fill="#6e6e73">on your bench</text>
  <line x1="848" y1="302" x2="1072" y2="302" stroke="#eeeef2" stroke-width="1.2"/>
  <g font-size="12.5" fill="#33333a"><circle cx="856" cy="324" r="3" fill="#86868b"/><text x="870" y="328">Klipper + Moonraker</text><circle cx="856" cy="352" r="3" fill="#86868b"/><text x="870" y="356">Moongate plugin</text></g>
  <rect x="844" y="372" width="232" height="44" rx="10" fill="#efeefb"/>
  <g transform="translate(854,384)"><rect x="0" y="6" width="15" height="11" rx="2" fill="#6C63FF"/><path d="M3,6 V3.6 a4.5,4.5 0 0 1 9,0 V6" fill="none" stroke="#6C63FF" stroke-width="2"/></g>
  <text x="878" y="391" font-size="12.5" font-weight="700" fill="#4b45c6">Auth proxy</text>
  <text x="878" y="407" font-size="10.5" fill="#6e6e73">route 1 only - broker's token</text>
  <rect x="844" y="426" width="232" height="44" rx="10" fill="#eaf8ee"/>
  <g transform="translate(854,438)" stroke="#1e9e4a" stroke-width="2" fill="none" stroke-linecap="round"><path d="M2,10 h14"/><path d="M9,3 v14"/><circle cx="9" cy="10" r="8"/></g>
  <text x="878" y="445" font-size="12.5" font-weight="700" fill="#1e9e4a">LAN trust</text>
  <text x="878" y="461" font-size="10.5" fill="#6e6e73">route 2 - Moonraker trusted_clients</text>

  <rect x="290" y="108" width="540" height="26" rx="13" fill="#fff3e0"/>
  <text x="560" y="126" font-size="13.5" font-weight="700" fill="#cc7a00" text-anchor="middle">Route 1 · Moongate cloud - zero setup, works anywhere</text>

  <rect x="284" y="150" width="230" height="74" rx="16" fill="#ffffff" stroke="#dcd9fb" stroke-width="1.5"/>
  <g transform="translate(300,172)" fill="#6C63FF"><ellipse cx="12" cy="17" rx="14" ry="9"/><ellipse cx="25" cy="12" rx="11" ry="10"/><ellipse cx="5" cy="13" rx="8" ry="7"/><rect x="0" y="17" width="32" height="8" rx="4"/></g>
  <text x="344" y="174" font-size="13.5" font-weight="700" fill="#1d1d1f">Access broker</text>
  <text x="344" y="190" font-size="10.5" fill="#6e6e73">anonymous · signs a short-lived</text>
  <text x="344" y="204" font-size="10.5" fill="#6e6e73">token + your Pi's address</text>

  <rect x="586" y="150" width="200" height="74" rx="16" fill="#fff8f0" stroke="#f3d8af" stroke-width="1.4"/>
  <g transform="translate(602,172)" fill="#FF9F0A"><ellipse cx="12" cy="17" rx="14" ry="9"/><ellipse cx="25" cy="12" rx="11" ry="10"/><ellipse cx="5" cy="13" rx="8" ry="7"/><rect x="0" y="17" width="32" height="8" rx="4"/></g>
  <text x="646" y="174" font-size="13.5" font-weight="700" fill="#1d1d1f">Cloudflare</text>
  <text x="646" y="190" font-size="10.5" fill="#cc7a00">secure tunnel · away</text>
  <text x="646" y="204" font-size="10.5" fill="#6e6e73">LAN-direct at home</text>

  <path d="M160,240 C180,196 230,182 280,180" fill="none" stroke="#FF9F0A" stroke-width="3" stroke-linecap="round" marker-start="url(#o3)" marker-end="url(#o3)"/>
  <path d="M518,187 L582,187" fill="none" stroke="#FF9F0A" stroke-width="3" stroke-linecap="round"/>
  <path d="M790,187 C830,190 850,205 866,226" fill="none" stroke="#FF9F0A" stroke-width="3" stroke-linecap="round" marker-start="url(#o3)" marker-end="url(#o3)"/>

  <rect x="330" y="242" width="460" height="30" rx="15" fill="#ffffff" stroke="#f0dede" stroke-width="1.2"/>
  <g transform="translate(348,250)"><rect x="0" y="5" width="14" height="11" rx="2" fill="#FF3B30"/><path d="M2.5,5 V2.8 a4.5,4.5 0 0 1 9,0 V5" fill="none" stroke="#FF3B30" stroke-width="2"/></g>
  <text x="372" y="262" font-size="11.5" font-weight="600" fill="#1d1d1f">Tunnel-safe - leak the URL, an attacker gets only 401s</text>

  <rect x="290" y="330" width="540" height="26" rx="13" fill="#eaf8ee"/>
  <text x="560" y="348" font-size="13.5" font-weight="700" fill="#1e9e4a" text-anchor="middle">Route 2 · Direct - your network or your own VPN, zero cloud</text>

  <rect x="360" y="376" width="400" height="74" rx="16" fill="#ffffff" stroke="#bfe6cd" stroke-width="1.5"/>
  <g transform="translate(378,396)" stroke="#1e9e4a" stroke-width="2.2" fill="none" stroke-linecap="round"><path d="M14,2 C7,2 2,7 2,13 v6 h24 v-6 C26,7 21,2 14,2 Z"/><circle cx="14" cy="12" r="3.2"/></g>
  <text x="418" y="398" font-size="13.5" font-weight="700" fill="#1d1d1f">Home WiFi · or your own VPN</text>
  <text x="418" y="415" font-size="10.5" fill="#6e6e73">WireGuard on the router · Tailscale · the phone</text>
  <text x="418" y="430" font-size="10.5" fill="#6e6e73">acts local, the printer's address never changes</text>

  <path d="M170,510 C230,470 290,430 356,414" fill="none" stroke="#34C759" stroke-width="3" stroke-linecap="round" marker-start="url(#g3)" marker-end="url(#g3)"/>
  <path d="M764,414 C800,420 830,440 856,470" fill="none" stroke="#34C759" stroke-width="3" stroke-linecap="round" marker-start="url(#g3)" marker-end="url(#g3)"/>

  <rect x="330" y="470" width="140" height="24" rx="12" fill="#eaf8ee"/><text x="400" y="486" font-size="11" font-weight="600" fill="#1e9e4a" text-anchor="middle">no cloud account</text>
  <rect x="480" y="470" width="160" height="24" rx="12" fill="#eaf8ee"/><text x="560" y="486" font-size="11" font-weight="600" fill="#1e9e4a" text-anchor="middle">zero outbound calls</text>
  <rect x="650" y="470" width="140" height="24" rx="12" fill="#eaf8ee"/><text x="720" y="486" font-size="11" font-weight="600" fill="#1e9e4a" text-anchor="middle">works offline</text>

  <text x="560" y="590" font-size="12.5" fill="#6e6e73" text-anchor="middle">Same app either way - switch a printer between modes without re-pairing. Print notifications and zero-setup remote need route 1.</text>
</svg>
