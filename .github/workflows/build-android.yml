name: Build Android APK

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the APK back to the repo

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Set up release signing
        # Decodes the keystore from the GitHub secret and writes key.properties
        # so every CI APK is signed with the same consistent key.
        # Without this, each Ubuntu runner generates a fresh debug keystore,
        # meaning every APK download would conflict with the previous install.
        env:
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$RELEASE_KEYSTORE" ]; then
            echo "$RELEASE_KEYSTORE" | base64 --decode > mobile/android/app/moongate-release.jks
            printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=moongate-release.jks\n' \
              "$RELEASE_STORE_PASSWORD" "$RELEASE_KEY_PASSWORD" "$RELEASE_KEY_ALIAS" \
              > mobile/android/key.properties
            echo "Release signing configured."
          else
            echo "RELEASE_KEYSTORE secret not set — falling back to debug signing."
          fi

      - name: Build release APK
        working-directory: mobile
        run: flutter build apk --release

      - name: Copy APK and generate version manifest
        run: |
          mkdir -p APK

          # Parse version and build number from pubspec.yaml
          # e.g. "version: 0.2.3+13" → VERSION=0.2.3  BUILD=13
          VERSION=$(grep '^version:' mobile/pubspec.yaml | sed 's/version:[[:space:]]*//' | cut -d'+' -f1)
          BUILD=$(grep '^version:' mobile/pubspec.yaml | sed 's/version:[[:space:]]*//' | cut -d'+' -f2)
          VERSIONED_NAME="Moongate-v${VERSION}.apk"

          # Write both a versioned copy and the always-current Moongate-latest.apk
          cp mobile/build/app/outputs/flutter-apk/app-release.apk "APK/${VERSIONED_NAME}"
          cp mobile/build/app/outputs/flutter-apk/app-release.apk APK/Moongate-latest.apk

          # Point the manifest at the versioned file so the GitHub folder makes it
          # immediately obvious which APK is which version.
          cat > APK/latest_version.json <<EOF
          {
            "version": "$VERSION",
            "build_number": $BUILD,
            "apk_url": "https://github.com/PEEKYPAUL/Moongate/raw/master/APK/${VERSIONED_NAME}",
            "published_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          echo "Versioned APK: ${VERSIONED_NAME}"
          echo "Version manifest: $(cat APK/latest_version.json)"

      - name: Commit and push APK + version manifest
        # Only commit on direct pushes to master (not PRs — they can't push back)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save the freshly built files before touching the git tree
          VERSION=$(grep '^version:' mobile/pubspec.yaml | sed 's/version:[[:space:]]*//' | cut -d'+' -f1)
          VERSIONED_NAME="Moongate-v${VERSION}.apk"
          cp APK/Moongate-latest.apk /tmp/Moongate-latest.apk
          cp "APK/${VERSIONED_NAME}" "/tmp/${VERSIONED_NAME}"
          cp APK/latest_version.json /tmp/latest_version.json

          # Sync to the current remote HEAD (handles concurrent CI runs that may
          # have already pushed an APK while this build was running).
          # We then overlay our fresh build on top so the latest build always wins.
          # A plain rebase fails on binary files when two runs commit the APK at
          # the same time, so we hard-reset instead.
          git fetch origin master
          git reset --hard origin/master

          # Only overwrite if our build number is >= what's already on remote.
          # Without this check, a slow CI run for an *older* commit (lower build
          # number) can finish after a newer run and silently downgrade the APK.
          REMOTE_BUILD=$(grep -o '"build_number":[^,}]*' APK/latest_version.json | grep -o '[0-9]*' || echo 0)
          LOCAL_BUILD=$(grep -o '"build_number":[^,}]*' /tmp/latest_version.json | grep -o '[0-9]*' || echo 0)
          echo "Remote build: $REMOTE_BUILD  |  Our build: $LOCAL_BUILD"

          if [ "$LOCAL_BUILD" -lt "$REMOTE_BUILD" ]; then
            echo "Remote already has a newer build ($REMOTE_BUILD > $LOCAL_BUILD) — skipping push."
            exit 0
          fi

          # Restore our freshly built outputs
          VERSION=$(grep '^version:' mobile/pubspec.yaml | sed 's/version:[[:space:]]*//' | cut -d'+' -f1)
          VERSIONED_NAME="Moongate-v${VERSION}.apk"
          cp /tmp/Moongate-latest.apk APK/Moongate-latest.apk
          cp "/tmp/${VERSIONED_NAME}" "APK/${VERSIONED_NAME}" 2>/dev/null || true
          cp /tmp/latest_version.json APK/latest_version.json

          git add APK/Moongate-latest.apk "APK/${VERSIONED_NAME}" APK/latest_version.json
          if git diff --staged --quiet; then
            echo "APK unchanged after sync, nothing to commit"
          else
            git commit -m "Release Moongate-v${VERSION} [skip ci]"
            git push origin master
          fi

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Moongate-release
          path: APK/Moongate-latest.apk
          retention-days: 30
