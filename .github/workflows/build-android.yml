name: Build Android APK

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the APK back to the repo

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Set up release signing
        # Decodes the keystore from the GitHub secret and writes key.properties
        # so every CI APK is signed with the same consistent key.
        # Without this, each Ubuntu runner generates a fresh debug keystore,
        # meaning every APK download would conflict with the previous install.
        env:
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$RELEASE_KEYSTORE" ]; then
            echo "$RELEASE_KEYSTORE" | base64 --decode > mobile/android/app/moongate-release.jks
            printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=moongate-release.jks\n' \
              "$RELEASE_STORE_PASSWORD" "$RELEASE_KEY_PASSWORD" "$RELEASE_KEY_ALIAS" \
              > mobile/android/key.properties
            echo "Release signing configured."
          else
            echo "RELEASE_KEYSTORE secret not set — falling back to debug signing."
          fi

      - name: Build release APK
        working-directory: mobile
        run: flutter build apk --release

      - name: Copy APK to APK folder
        run: |
          mkdir -p APK
          cp mobile/build/app/outputs/flutter-apk/app-release.apk APK/Moongate-latest.apk

      - name: Commit and push updated APK
        # Only commit on direct pushes to master (not PRs — they can't push back)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add APK/Moongate-latest.apk
          if git diff --staged --quiet; then
            echo "APK unchanged, nothing to commit"
          else
            git commit -m "Update Moongate-latest.apk [skip ci]"
            # Pull and rebase in case another concurrent CI run pushed first.
            # --autostash handles any unstaged files (e.g. the decoded JKS).
            git pull --rebase --autostash origin master
            git push
          fi

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Moongate-release
          path: APK/Moongate-latest.apk
          retention-days: 30
