name: Build Android APK

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the manifest + publish the Release

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Set up release signing
        # Decodes the keystore from the GitHub secret and writes key.properties
        # so every CI APK is signed with the same consistent key.
        # Without this, each Ubuntu runner generates a fresh debug keystore,
        # meaning every APK download would conflict with the previous install.
        env:
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$RELEASE_KEYSTORE" ]; then
            echo "$RELEASE_KEYSTORE" | base64 --decode > mobile/android/app/moongate-release.jks
            printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=moongate-release.jks\n' \
              "$RELEASE_STORE_PASSWORD" "$RELEASE_KEY_PASSWORD" "$RELEASE_KEY_ALIAS" \
              > mobile/android/key.properties
            echo "Release signing configured."
          else
            echo "RELEASE_KEYSTORE secret not set - falling back to debug signing."
          fi

      - name: Build release APK
        working-directory: mobile
        run: flutter build apk --release

      - name: Stage APK + read version
        # The signed APK is published ONLY as a GitHub Release asset (next step)
        # - it is no longer committed to the repo. Stage it under its versioned
        # name so the release-upload and artifact steps can find it.
        id: meta
        run: |
          VERSION=$(grep '^version:' mobile/pubspec.yaml | sed 's/version:[[:space:]]*//' | cut -d'+' -f1)
          BUILD=$(grep '^version:' mobile/pubspec.yaml | sed 's/version:[[:space:]]*//' | cut -d'+' -f2)
          cp mobile/build/app/outputs/flutter-apk/app-release.apk "Moongate-v${VERSION}.apk"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD"     >> "$GITHUB_OUTPUT"
          echo "Built Moongate-v${VERSION}.apk (build $BUILD)"

      - name: Publish APK as a GitHub Release asset
        # Why a Release asset, not a committed file: the signed APK is ~73 MB,
        # which tripped GitHub's 50 MB push warning on EVERY push and bloated
        # the git history. Release assets carry none of that cost. Idempotent -
        # re-running on the same version replaces the asset instead of erroring.
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          TAG="v${VERSION}"
          ASSET="Moongate-v${VERSION}.apk"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists - replacing asset"
            gh release upload "$TAG" "$ASSET" --clobber
          else
            echo "Creating Release $TAG"
            gh release create "$TAG" "$ASSET" \
              --title "Moongate v${VERSION}" \
              --notes "See the [changelog](https://github.com/${GITHUB_REPOSITORY}/blob/master/CHANGELOG.md) for what's in this release.

          **APK is signed with the project release key - installs cleanly over any previous CI build.**" \
              --latest
          fi

      - name: Update version manifest, push
        # Commits ONLY APK/latest_version.json (tiny). Its apk_url points at the
        # Release asset published in the previous step, so the in-app updater
        # downloads from the Release, not from the repo. No APK binary is ever
        # committed. Runs AFTER the asset is published so the manifest never
        # advertises a download URL that doesn't exist yet.
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          VERSION="${{ steps.meta.outputs.version }}"
          BUILD="${{ steps.meta.outputs.build }}"

          # Sync to the current remote HEAD (handles concurrent CI runs that may
          # have already pushed a manifest while this build was running).
          git fetch origin master
          git reset --hard origin/master

          # Don't let a slow CI run for an OLDER commit (lower build number)
          # finish late and downgrade the manifest to a stale version.
          REMOTE_BUILD=$(grep -o '"build_number":[^,}]*' APK/latest_version.json 2>/dev/null | grep -o '[0-9]*' || echo 0)
          REMOTE_BUILD=${REMOTE_BUILD:-0}
          echo "Remote manifest build: $REMOTE_BUILD  |  Our build: $BUILD"
          if [ "$BUILD" -lt "$REMOTE_BUILD" ]; then
            echo "Remote already has a newer build ($REMOTE_BUILD > $BUILD) - skipping manifest update."
            exit 0
          fi

          mkdir -p APK
          cat > APK/latest_version.json <<EOF
          {
            "version": "$VERSION",
            "build_number": $BUILD,
            "apk_url": "https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/Moongate-v${VERSION}.apk",
            "published_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

          git add APK/latest_version.json
          if git diff --staged --quiet; then
            echo "Manifest unchanged, nothing to commit"
          else
            git commit -m "Release Moongate-v${VERSION} [skip ci]"
            git push origin master
            echo "Published manifest for v${VERSION} (build $BUILD)"
          fi

      - name: Prune old Releases (keep last 3)
        # Drops every Release past the 3 most-recent (by createdAt). --cleanup-tag
        # also removes the underlying git tag so it doesn't linger.
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OLD_TAGS=$(gh release list --limit 100 --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[3:] | .[].tagName')
          if [ -z "$OLD_TAGS" ]; then
            echo "Nothing to prune - 3 or fewer releases exist."
          else
            echo "$OLD_TAGS" | while read -r tag; do
              if [ -n "$tag" ]; then
                echo "Deleting old release: $tag"
                gh release delete "$tag" --yes --cleanup-tag
              fi
            done
          fi

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: Moongate-release
          path: Moongate-v${{ steps.meta.outputs.version }}.apk
          retention-days: 30
