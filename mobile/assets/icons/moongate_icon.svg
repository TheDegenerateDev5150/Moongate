<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Transparent background: only the red ring + crescent render, so the
       mark sits cleanly on any theme. The crescent's bite is a real cut-out
       (mask) rather than a circle painted in the old background colour. -->
  <mask id="moon-bite">
    <rect width="100" height="100" fill="#000"/>
    <circle cx="50" cy="50" r="15" fill="#fff"/>
    <circle cx="56.5" cy="47" r="12.6" fill="#000"/>
  </mask>
  <circle cx="50" cy="50" r="32" fill="none" stroke="#FF3B30" stroke-width="6.5"/>
  <circle cx="50" cy="50" r="15" fill="#FF3B30" mask="url(#moon-bite)"/>
</svg>
