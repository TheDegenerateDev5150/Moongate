name: moongate
description: Remote control interface for Klipper 3D printers via local WiFi or Cloudflare tunnel.
version: 0.9.54+127
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Internationalization (i18n). flutter_localizations supplies the built-in
  # Material/Cupertino/Widgets localizations; `flutter gen-l10n` turns the
  # lib/l10n/*.arb bundles into the AppLocalizations class (see l10n.yaml),
  # which the generated code imports `intl` for. Code-gen is switched on by
  # `flutter: generate: true` further down.
  flutter_localizations:
    sdk: flutter
  intl: any

  # Networking
  http: ^1.2.0

  # Detects whether the phone is on Wi-Fi or mobile data, so the dashboard can
  # use the faster "local" camera-feed rate on Wi-Fi (even when reaching a
  # printer remotely over the tunnel) and the throttled "tunnel" rate only on
  # metered mobile data. See onMobileDataProvider / WebcamView.
  connectivity_plus: ^6.1.0

  # Supabase - anonymous auth, Edge Function calls, printers table queries.
  # v0.3.0 routes every printer call through Supabase: app signs in
  # anonymously, gets a JWT, calls /printer-access to fetch the current
  # tunnel URL + a short-lived EdDSA access token, then hits the Pi.
  supabase_flutter: ^2.16.0

  # Secure storage (token / pairing data)
  flutter_secure_storage: ^9.0.0

  # QR code scanning (pairing screen).
  # 7.x rewrites the Android start path - fixes the `analysis.resolutionInfo!!`
  # NPE in 5.x that fired on Samsung One UI as `genericError / NPE getClass()`.
  mobile_scanner: ^7.0.0

  # State management + navigation
  flutter_riverpod: ^2.5.0
  go_router: ^13.0.0

  # WebView (full Mainsail/Fluidd UI per printer). The two platform packages
  # are direct dependencies (same versions the lock already resolves) so the
  # controller factory can relax each platform's media-autoplay default -
  # go2rtc/WebRTC webcams render as muted autoplaying <video> elements that
  # both platforms otherwise block.
  webview_flutter: ^4.14.1
  webview_flutter_android: ^4.12.0
  webview_flutter_wkwebview: ^3.25.1

  # Persistent settings
  shared_preferences: ^2.2.0

  # Material You "dynamic colour" - reads the wallpaper-derived palette on
  # Android 12+ for the optional "Phone colours" theme. The builder returns
  # null schemes on older Android / iOS, where the app falls back to its seeded
  # theme; the option itself is only shown where the palette is available.
  dynamic_color: ^1.7.0

  # App version info (reads version from the installed package manifest)
  package_info_plus: ^9.0.1

  # Device model + Android version for the in-app bug-report diagnostics.
  # This project's bugs skew heavily Samsung / One UI, so the exact model is
  # worth capturing on every report. Read-only; no runtime permissions.
  # Pinned at 10.x: 12.x's iOS plugin calls NSProcessInfo.isiOSAppOnVision,
  # a selector our Xcode SDK doesn't have, so 12 fails the iOS build (Android
  # is unaffected). Revisit when a device_info_plus release guards that call
  # or the iOS build SDK moves up.
  device_info_plus: ^10.1.0

  # Open URLs in the browser (used for the in-app update download prompt)
  url_launcher: ^6.3.0

  # SVG rendering (Mainsail / Fluidd logos in webcam placeholder)
  flutter_svg: ^2.0.0

  # Explicit camera permission check before opening the QR scanner.
  # Separates permission request from camera initialisation so mobile_scanner
  # never tries to open the hardware before the user has granted access.
  permission_handler: ^11.0.0

  # v0.5.0: mDNS / DNS-SD discovery for `_moongate._tcp.local` advertised
  # by v0.4.4+ Pis. See docs/v0.5-lan-discovery-design.md §7.1 for the
  # rationale (Android NsdManager + iOS NetServiceBrowser under one API).
  bonsoir: ^5.1.0

  # Backup/restore: save/load the printer list as a file via the Android
  # Storage Access Framework (saveFile + pickFiles). Replaces the old
  # clipboard round-trip, which was fragile. No storage permission needed -
  # SAF hands back a user-chosen document URI.
  file_picker: ^8.0.0

  # Custom dashboard background: copy the user-picked image into the app's
  # documents directory so it persists across launches (file_picker only hands
  # back a cache path the OS may evict). Path lookup only, no permissions.
  path_provider: ^2.1.6

  # App lock: biometric (fingerprint/face) prompt. MainActivity already
  # extends FlutterFragmentActivity, which local_auth requires on Android,
  # so no native activity change is needed.
  local_auth: ^2.3.0

  # Salted SHA-256 hashing for the app-lock PIN (stored in flutter_secure_storage).
  crypto: ^3.0.0

  # Print notifications (opt-in, off by default). A foreground service keeps a
  # background isolate alive to poll /status (LAN-first, slow interval) and post
  # the persistent progress notification; flutter_local_notifications posts the
  # discrete state-change alerts (started / paused / complete / cancelled / error).
  flutter_foreground_task: ^8.0.0
  flutter_local_notifications: ^18.0.0

  # Masonry dashboard grid (MasonryGridView): lets full webcam tiles and compact
  # (webcam-hidden) tiles each take their natural height and pack the columns
  # tightly, instead of one uniform cell size for every tile.
  flutter_staggered_grid_view: ^0.7.0

  # Drag-to-reorder the printer tiles directly on the dashboard (manual-order
  # mode). The built-in ReorderableListView is single-axis only; this pure-Dart
  # package reorders within a 2-D grid. Reorder mode uses uniform fixed-height
  # cells (the package needs them) while the masonry above is the normal view.
  reorderable_grid_view: ^2.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Generates the Android launcher icon (every mipmap density + adaptive icon)
  # from the source PNGs in assets/icon/ (rendered by tool/make_icon.py).
  # Run after changing the icon:  dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.1

# supabase_flutter 2.x transitively depends on app_links for OAuth deep-link
# callbacks. We only use anonymous sign-in, so the dep is unused at runtime,
# but it has to resolve. app_links 7.x uses an AndroidLibrarySourceSet API
# that breaks on this project's AGP 9.0.1 (Gradle cast error). Pin an older
# 6.x release that uses the legacy API and builds cleanly.
dependency_overrides:
  app_links: ^6.4.0

flutter:
  uses-material-design: true
  # Enable `flutter gen-l10n` codegen (reads l10n.yaml + lib/l10n/*.arb).
  generate: true
  assets:
    - assets/icons/
    - assets/changelog.json

  # Bundled, open-licensed (SIL OFL) fonts for the in-app Font picker. A Flutter
  # app can't read the user's selected system font, so we ship a small set: a
  # rounded sans (Nunito), a serif (Lora), and a high-readability face (Atkinson
  # Hyperlegible). "Default" uses no override. Nunito/Lora are variable fonts
  # (one file covers all weights); Atkinson is static, so we ship Regular + Bold.
  # Licenses live in assets/fonts/OFL-*.txt.
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-variable.ttf
    - family: Lora
      fonts:
        - asset: assets/fonts/Lora-variable.ttf
    - family: AtkinsonHyperlegible
      fonts:
        - asset: assets/fonts/AtkinsonHyperlegible-Regular.ttf
        - asset: assets/fonts/AtkinsonHyperlegible-Bold.ttf
          weight: 700
    - family: Poppins
