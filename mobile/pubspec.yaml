name: moongate
description: Remote control interface for Klipper 3D printers via local WiFi or Cloudflare tunnel.
version: 0.2.0+10
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Networking
  web_socket_channel: ^2.4.0
  http: ^1.2.0

  # Secure storage (token / pairing data)
  flutter_secure_storage: ^9.0.0

  # QR code scanning (pairing screen)
  mobile_scanner: ^5.0.0

  # State management + navigation
  flutter_riverpod: ^2.5.0
  go_router: ^13.0.0

  # WebView (full Mainsail/Fluidd UI per printer)
  webview_flutter: ^4.7.0

  # UUID generation for printer IDs
  uuid: ^4.4.0

  # Persistent settings
  shared_preferences: ^2.2.0

  # App version info (reads version from the installed package manifest)
  package_info_plus: ^8.0.0

  # Open URLs in the browser (used for the in-app update download prompt)
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
