<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moongate - Pair your phone</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f; color: #e0e0e0;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #1e1e1e; border-radius: 16px; padding: 40px;
      max-width: 440px; width: 90%; text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    h1 { font-size: 1.5rem; margin-bottom: 6px; color: #fff; }
    .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 28px; }
    #qr-wrap {
      background: #fff; border-radius: 12px;
      display: inline-flex; align-items: center; justify-content: center;
      padding: 16px; margin-bottom: 24px;
      min-width: 260px; min-height: 260px;
    }
    #qr-wrap canvas, #qr-wrap img, #qr-wrap table {
      display: block; max-width: 260px;
    }
    .step { text-align: left; margin-bottom: 10px; font-size: 0.9rem; color: #bbb; }
    .step span { color: #7c9eff; font-weight: 600; margin-right: 8px; }
    .error { color: #f77; margin: 8px 0; font-size: 0.9rem; line-height: 1.5; }
    .spinner {
      border: 3px solid #ddd; border-top-color: #333;
      border-radius: 50%; width: 40px; height: 40px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn {
      display: inline-block; margin-top: 14px; padding: 10px 24px;
      background: #7c9eff; color: #fff; border: none;
      border-radius: 8px; cursor: pointer; font-size: 0.9rem; text-decoration: none;
    }
    .btn:hover { background: #5a7fe0; }
    .raw-url {
      margin-top: 16px; font-size: 0.7rem; color: #555;
      word-break: break-all; line-height: 1.4;
    }
    .badge {
      display: inline-block; margin-bottom: 20px; padding: 4px 10px;
      border-radius: 20px; font-size: 0.75rem; font-weight: 600;
    }
    .badge.remote { background: #1a3a1a; color: #4caf50; }
    .badge.local  { background: #1a1a3a; color: #7c9eff; }
  </style>
</head>
<body>
<div class="card">
  <h1>Moongate Pairing</h1>
  <p class="subtitle">Scan with the Moongate app to add this printer</p>
  <div id="badges"></div>
  <div id="qr-wrap"><div class="spinner"></div></div>
  <div id="msg"></div>

  <div class="step"><span>1</span>Run <code>MOONGATE_PAIR</code> in your Klipper console</div>
  <div class="step"><span>2</span>Open the Moongate app &rarr; tap <strong>Add Printer</strong></div>
  <div class="step"><span>3</span>Tap the QR icon and scan the code above</div>
</div>

<script>
// ── dynamic script loader ────────────────────────────────────────────────────
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload  = resolve;
    s.onerror = () => reject(new Error('Failed to load: ' + src));
    document.head.appendChild(s);
  });
}

// ── try several CDNs for qrcodejs ────────────────────────────────────────────
const QR_CDNS = [
  'https://unpkg.com/qrcodejs@1.0.0/qrcode.min.js',
  'https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js',
];

async function loadQRLib() {
  for (const cdn of QR_CDNS) {
    try {
      await loadScript(cdn);
      if (typeof QRCode !== 'undefined') return true;
    } catch (_) {}
  }
  return false;
}

// ── render ───────────────────────────────────────────────────────────────────
async function load() {
  const wrap = document.getElementById('qr-wrap');
  const msg  = document.getElementById('msg');
  const bdg  = document.getElementById('badges');
  wrap.innerHTML = '<div class="spinner"></div>';
  msg.innerHTML  = '';
  bdg.innerHTML  = '';

  // 1. Fetch QR URL from Moonraker
  let qr_url, tunnel_url;
  try {
    const res  = await fetch('/server/moongate/qr');
    const json = await res.json();
    if (!res.ok) throw new Error(json?.error?.message || 'HTTP ' + res.status);
    const data = json.result ?? json;
    qr_url     = data.qr_url;
    tunnel_url = data.tunnel_url;
    if (!qr_url) throw new Error('No qr_url returned - run MOONGATE_PAIR first');
  } catch (e) {
    wrap.innerHTML = '';
    msg.innerHTML  = `<p class="error">${e.message}</p>
                      <button class="btn" onclick="load()">Retry</button>`;
    return;
  }

  // 2. Show access badges
  const hasRemote = tunnel_url && tunnel_url.length > 0;
  bdg.innerHTML =
    '<span class="badge local">Local</span>' +
    (hasRemote ? ' <span class="badge remote">Remote ✓</span>' : '');

  // 3. Load QR library and render
  const loaded = await loadQRLib();
  wrap.innerHTML = '';

  if (loaded) {
    try {
      new QRCode(wrap, {
        text:         qr_url,
        width:        256, height: 256,
        colorDark:    '#000000',
        colorLight:   '#ffffff',
        correctLevel: QRCode.CorrectLevel.M,
      });
      // Show raw URL as tiny fallback text under the card
      msg.innerHTML = `<p class="raw-url">${qr_url.substring(0, 60)}…</p>`;
      return;
    } catch (e) {
      msg.innerHTML = `<p class="error">QR render error: ${e.message}</p>`;
    }
  } else {
    msg.innerHTML = '<p class="error">QR library could not load (no internet?).</p>';
  }

  // 4. Fallback - show the raw URL and a link to an online QR generator
  const encoded = encodeURIComponent(qr_url);
  msg.innerHTML += `
    <p style="margin-top:12px;font-size:0.85rem;color:#aaa">
      Copy the URL below and paste it into any QR generator:
    </p>
    <p class="raw-url" id="raw-url-text" style="color:#7c9eff;cursor:pointer"
       onclick="navigator.clipboard?.writeText(this.dataset.url).then(()=>this.textContent='Copied!')"
       data-url="${qr_url}">${qr_url.substring(0, 80)}…</p>
    <a class="btn" href="https://api.qrserver.com/v1/create-qr-code/?size=256x256&data=${encoded}"
       target="_blank" style="margin-top:10px">Generate QR online</a>`;
}

load();
</script>
</body>
</html>
